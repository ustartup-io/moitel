services:
  bot:
    build: .
    container_name: affiliate-bot
    env_file: .env
    restart: unless-stopped
    volumes:
      # Persist the SQLite database across rebuilds.
      # In .env set: DATABASE_URL=sqlite+aiosqlite:///./data/bot.db
      - ./data:/app/data
    # Long polling: no ports needed.
    # Webhook mode (added in a later step) will expose "8080:8080".
