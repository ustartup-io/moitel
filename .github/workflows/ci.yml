name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy app

      - name: Pytest
        run: pytest -q

      - name: Alembic migration check
        env:
          BOT_TOKEN: dummy:token
          ADMIN_CHAT_ID: "1"
          LANDING_URL: https://example.com
        run: |
          alembic upgrade head
          alembic downgrade -1
          alembic upgrade head

      - name: Boot smoke check
        env:
          BOT_TOKEN: dummy:token
          ADMIN_CHAT_ID: "1"
          LANDING_URL: https://example.com
          ENVIRONMENT: prod
        run: python -m app.main --check
